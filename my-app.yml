apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd

spec:
  project: default
  source:
    repoURL: 'https://github.com/HUkarthik/argocd-app.git'
    targetRevision: HEAD
    path: .

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: my-space
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
