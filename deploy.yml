apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deploy

spec:
 replicas: 2
 selector:
  matchLabels:
    app: app-deploy
  
 template:
  metadata:
   labels:
    app: app-deploy
  spec:
   containers:
    - name: app-deploy
      image: hukarthik/python-project:0.1
      ports:
       - containerPort:  8000